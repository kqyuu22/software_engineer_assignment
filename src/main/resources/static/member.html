<!DOCTYPE html>
<html lang="en">

<head>
    <title>Member Dashboard</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        th,
        td {
            padding: 10px;
            border: 1px solid #ccc;
            text-align: left;
        }

        button.pay-btn {
            padding: 5px 10px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
    <script src="auth.js"></script>
</head>

<body>
    <h1>Member Dashboard</h1>

    <h3>My Parking History</h3>
    <table>
        <thead>
            <tr>
                <th>Ticket ID</th>
                <th>License Plate</th>
                <th>Entry Time</th>
                <th>Exit Time</th>
            </tr>
        </thead>
        <tbody id="history-body"></tbody>
    </table>

    <h3>My Payments</h3>
    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="payment-body"></tbody>
    </table>

    <script>
        // Enforce member role
        requireAuth("MEMBER");
        const API_BASE = "/member";

        async function loadHistory() {

            const res = await fetch(`${API_BASE}/history`, { headers: authHeaders });
            console.log("History API Response:", res);
            await handleResponse(res);
            const tickets = await res.json();

            console.log("Received tickets: ", tickets);

            if (tickets.length === 0) {
                document.getElementById("history-body").innerHTML = "<tr><td colspan='4'>No parking history found.</td></tr>";
                return;
            }

            if (res.ok) {
                console.log("Parking history loaded successfully.");
                let html = "";
                tickets.forEach(t => {
                    html += `<tr><td>${t.ticketId}</td><td>${t.licensePlate}</td><td>${new Date(t.entryTime).toLocaleString()}</td><td>${t.exitTime ? new Date(t.exitTime).toLocaleString() : 'ACTIVE'}</td></tr>`;
                });
                document.getElementById("history-body").innerHTML = html;
            } else {
                console.error("Failed to load parking history.");
            }


        }

        async function loadPayments() {
            try {
                const res = await fetch(`${API_BASE}/payment`, { headers: authHeaders });
                console.log("Payments API Response:", res);
                await handleResponse(res);
                const payments = await res.json();

                console.log("Received payments: ", payments);

                let html = "";
                payments.forEach(p => {
                    const isPaid = p.status === "PAID";
                    const actionCell = isPaid
                        ? `<strong style="color:green;">Paid</strong>`
                        : `<button class="pay-btn" onclick="executePayment(${p.billId}, ${p.userId}, ${p.amount})">Pay Now (BKPay)</button>`;

                    html += `<tr><td>${p.billingMonth ? p.billingMonth : 'N/A'}</td><td>$${p.amount}</td><td>${p.status}</td><td>${actionCell}</td></tr>`;
                });
                document.getElementById("payment-body").innerHTML = html;
            } catch (e) { console.error("Failed to load payments"); }
        }

        function executePayment(paymentId, userId, amount) {
            const qrData = `Account: 1001000|UserId:${userId}|Amount:${amount}|BillId:${paymentId}`;
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(qrData)}`;
            
            const overlay = document.createElement("div");
            overlay.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;justify-content:center;align-items:center;z-index:1000;";
            overlay.innerHTML = `
                <div style="background:white;padding:20px;text-align:center;border-radius:8px;box-shadow:0 4px 6px rgba(0,0,0,0.1);">
                    <h3>Scan to Pay</h3>
                    <img src="${qrUrl}" alt="QR Code" style="margin:10px 0;width:200px;height:200px;" />
                    <p style="margin:5px 0;"><strong>Target Account:</strong> 1001000</p>
                    <p style="margin:5px 0;"><strong>User ID:</strong> ${userId} | <strong>Amount:</strong> $${amount}</p>
                    <div style="margin-top:15px;display:flex;gap:10px;justify-content:center;">
                        <button id="confirm-pay-btn" style="padding:8px 15px;background:#28a745;color:white;border:none;border-radius:4px;cursor:pointer;">I have paid</button>
                        <button id="cancel-pay-btn" style="padding:8px 15px;background:#dc3545;color:white;border:none;border-radius:4px;cursor:pointer;">Cancel</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);

            document.getElementById("cancel-pay-btn").onclick = () => document.body.removeChild(overlay);
            document.getElementById("confirm-pay-btn").onclick = async () => {
                document.body.removeChild(overlay);
                try {
                    const res = await fetch(`${API_BASE}/payment/${paymentId}`, {
                        method: "POST",
                        headers: authHeaders
                    });
                    await handleResponse(res);
                    console.log("Execute Payment API Response:", res);
                    const data = await res.json();
                    alert(data.message);
                    loadPayments(); // Reload table to show PAID status
                } catch (e) { alert("Payment failed."); }
            };
        }

        window.onload = async () => {
            await loadHistory();
            await loadPayments();
        };
    </script>
</body>

</html>
